name: reproducibility-tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - run: python -m pytest -q
      - run: python scripts/build_paper_tables.py
      - run: python scripts/run_aggregate_diagnostics.py all --output generated_ci
